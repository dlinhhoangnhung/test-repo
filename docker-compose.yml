services:
    app:
        build: .
        restart: unless-stopped
        volumes:
            - nginx_assets:/var/www/html/public_html
            - ./storage:/var/www/html/storage
            - ./.env:/var/www/html/.env
        env_file:
            - .env
        networks:
            - internal

    nginx:
        image: nginx:1.25-alpine
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - nginx_assets:/var/www/html/public:ro
            - ./storage/app/public:/var/www/html/storage/app/public:ro
        depends_on:
            - app
        networks:
            - internal

    queue:
        build: .
        restart: unless-stopped
        command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
        env_file:
            - .env
        networks:
            - internal

    scheduler:
        build: .
        restart: unless-stopped
        command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
        env_file:
            - .env
        networks:
            - internal

networks:
    internal:
        name: aureus_network
        external: true

volumes:
    nginx_assets:
